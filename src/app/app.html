<!-- 全站導覽列 -->
<header class="navbar" [class.menu-open]="menuOpen()">

  <!-- 左：品牌 -->
  <a class="navbar__brand" routerLink="/" (click)="closeMenu()">
    <span class="navbar__brand-icon">🗺️</span>
    {{ title }}
  </a>

  <!-- 右：桌機導覽連結 -->
  <nav class="navbar__nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">
      景點列表
    </a>
    <a routerLink="/favorites" routerLinkActive="active" (click)="closeMenu()">
      我的最愛
      @if (favoritesService.count() > 0) {
        <span class="badge">{{ favoritesService.count() }}</span>
      }
    </a>
  </nav>

  <!-- 右側工具列 -->
  <div class="navbar__actions">
    <!-- 深淺色切換 -->
    <button class="navbar__theme-btn" (click)="toggleTheme()" [title]="isDark() ? '切換淺色模式' : '切換深色模式'">
      @if (isDark()) {
        <!-- 太陽 icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <!-- 月亮 icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <!-- 手機版漢堡按鈕 -->
    <button class="navbar__hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- 手機版下拉選單（放在 header 內，absolute 定位不影響主內容） -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        景點列表
      </a>
      <a routerLink="/favorites" routerLinkActive="active" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        我的最愛
        @if (favoritesService.count() > 0) {
          <span class="badge">{{ favoritesService.count() }}</span>
        }
      </a>
    </div>
  }

</header>

<!-- 頁面內容區 -->
<main class="main-content">
  <router-outlet />
</main>

<!-- 懸浮聊天 Widget -->
<app-chat-widget />

<!-- Toast 通知 -->
<app-toast-container />
