<!-- 懸浮聊天按鈕 -->
<button class="chat-fab" (click)="toggleOpen()" [class.is-open]="isOpen()" title="台北旅遊小幫手">
  @if (isOpen()) {
    <!-- 關閉 icon -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  } @else {
    <!-- 聊天 icon -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  }
</button>

<!-- 聊天視窗 -->
@if (isOpen()) {
  <div class="chat-panel">

    <!-- 標題列 -->
    <div class="chat-header">
      <div class="chat-header__info">
        <div class="chat-header__avatar">🗺️</div>
        <div>
          <div class="chat-header__name">台北旅遊小幫手</div>
        </div>
      </div>
      <button class="chat-header__clear" (click)="clearChat()" title="清除對話">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>

    <!-- 訊息區 -->
    <div class="chat-messages" #messageList>

      <!-- 歡迎訊息 -->
      @if (messages().length === 0) {
        <div class="chat-welcome">
          <div class="chat-welcome__icon">👋</div>
          <p>你好！我是台北旅遊小幫手</p>
          <p class="chat-welcome__sub">有任何台北景點、美食、交通的問題都可以問我！</p>
          <div class="chat-welcome__hints">
            <button class="hint-chip" (click)="inputText='推薦台北必去景點'; sendMessage()">推薦必去景點</button>
            <button class="hint-chip" (click)="inputText='台北101附近有什麼好吃的'; sendMessage()">101附近美食</button>
            <button class="hint-chip" (click)="inputText='從機場怎麼到台北市區'; sendMessage()">機場交通</button>
          </div>
        </div>
      }

      <!-- 對話訊息 -->
      @for (msg of messages(); track $index) {
        <div class="chat-msg" [class.chat-msg--user]="msg.role === 'user'" [class.chat-msg--bot]="msg.role === 'assistant'">
          @if (msg.role === 'assistant') {
            <div class="chat-msg__avatar">🗺️</div>
          }
          <div class="chat-msg__bubble">{{ msg.content }}</div>
        </div>
      }

      <!-- 載入中 -->
      @if (loading()) {
        <div class="chat-msg chat-msg--bot">
          <div class="chat-msg__avatar">🗺️</div>
          <div class="chat-msg__bubble chat-msg__bubble--loading">
            <span></span><span></span><span></span>
          </div>
        </div>
      }

      <!-- 錯誤 -->
      @if (errorMsg()) {
        <div class="chat-error">{{ errorMsg() }}</div>
      }
    </div>

    <!-- 輸入列 -->
    <div class="chat-input">
      <textarea
        class="chat-input__field"
        [(ngModel)]="inputText"
        (keydown)="onKeydown($event)"
        placeholder="輸入問題… (Enter 送出)"
        rows="1"
      ></textarea>
      <button
        class="chat-input__send"
        (click)="sendMessage()"
        [disabled]="!inputText.trim() || loading()"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
}
